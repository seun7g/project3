<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | FusionStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">

    <style>
        body {
            background: #f8fafc;
            font-family: system-ui, sans-serif;
        }

        .navbar-modern {
            background: #0f172a;
            padding: 1rem;
        }

        .cart-card {
            background: white;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .summary {
            background: white;
            padding: 20px;
            border-radius: 18px;
            position: sticky;
            top: 20px;
            border: 1px solid #e2e8f0;
        }

        .btn-primary {
            border-radius: 30px;
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar-modern text-white d-flex justify-content-between">
    <a href="index.html" class="text-white text-decoration-none">
        ← Continue Shopping
    </a>
    <strong>My Cart</strong>
</nav>

<div class="container my-4">
    <div class="row">

        <!-- CART ITEMS -->
        <div class="col-lg-8">
            <div id="cart-container"></div>
        </div>

        <!-- SUMMARY -->
        <div class="col-lg-4">
            <div class="summary">
                <h5>Order Summary</h5>
                <hr>

                <p>Subtotal: <span id="subtotal">$0</span></p>
                <p>Tax: <span id="tax">$0</span></p>
                <h5>Total: <span id="total">$0</span></h5>

                <button class="btn btn-primary w-100 mt-3">
                    Checkout
                </button>
            </div>
        </div>

    </div>
</div>

<script>
let products = [];
let cartItems = [];

/* ================= LOAD PRODUCTS FIRST ================= */
async function loadProducts() {
    try {
        const res = await fetch("Asset/files/products.json");
        products = await res.json();

        console.log("Products loaded:", products.length);

        loadCart(); // IMPORTANT ORDER

    } catch (err) {
        console.error("Error loading products:", err);
    }
}

/* ================= LOAD CART FROM STORAGE ================= */
function loadCart() {
    let cartIds = JSON.parse(localStorage.getItem("fusion_cart")) || [];

    cartItems = [];

    cartIds.forEach(id => {
        const product = products.find(p => p.id === id);

        if (product) {
            let existing = cartItems.find(i => i.id === id);

            if (existing) {
                existing.qty++;
            } else {
                cartItems.push({
                    ...product,
                    qty: 1
                });
            }
        }
    });

    renderCart();
    calculateTotal();
}

/* ================= RENDER CART ================= */
function renderCart() {
    const container = document.getElementById("cart-container");

    if (cartItems.length === 0) {
        container.innerHTML = `
            <div class="text-center p-5 bg-white rounded-4">
                <h5>Your cart is empty</h5>
                <a href="index.html" class="btn btn-primary mt-3">Go Shopping</a>
            </div>
        `;
        return;
    }

    container.innerHTML = cartItems.map(item => `
        <div class="cart-card d-flex align-items-center justify-content-between">
            
            <img src="${item.image}" class="cart-img">

            <div class="flex-grow-1 ms-3">
                <h6>${item.name}</h6>
                <small>$${item.price} each</small>
            </div>

            <div class="fw-bold">
                $${(item.price * item.qty).toFixed(2)}
            </div>
        </div>
    `).join('');
}

/* ================= CALCULATE TOTAL ================= */
function calculateTotal() {
    let subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
    let tax = subtotal * 0.1;
    let total = subtotal + tax;

    document.getElementById("subtotal").innerText = `$${subtotal.toFixed(2)}`;
    document.getElementById("tax").innerText = `$${tax.toFixed(2)}`;
    document.getElementById("total").innerText = `$${total.toFixed(2)}`;
}

/* ================= INIT ================= */
loadProducts();

</script>

</body>
</html>
