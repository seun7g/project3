<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 20px;
            transition: .25s;
            z-index: 1000;
        }

        .sidebar.hide {
            transform: translateX(-100%);
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .category-item {
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .category-item:hover {
            background: #f1f5f9;
        }

        .category-active {
            background: #e0edff;
            color: #2563eb;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 260px;
            padding: 20px;
            transition: .25s;
        }

        .main.full {
            margin-left: 0;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            background: #fff;
            padding: 12px 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            top: 10px;

            position: sticky;

            top: 0;

            z-index: 500;

        }

        .toggle-btn {
            border: none;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 10px;
        }

        /* ===== PRODUCT CARD ===== */
        .product-card {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #eee;
            transition: .2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, .05);
        }

        .product-img {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img img {
            max-height: 100%;
        }

        .price {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .old {
            text-decoration: line-through;
            color: #888;
            font-size: .8rem;
            margin-left: 5px;
        }

        .btn-add {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 8px;
            background: #0f172a;
            color: #fff;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #2563eb;
        }

        .search-box {
            display: flex;
            gap: 6px;
        }

        .search-box input {
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            width: 160px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 900;
        }

        .overlay.show {
            display: block;
        }

        #product-list {
            margin-top: 10px;
        }

        @media(max-width:768px) {
            .search-box {
                width: 100%;
            }

            .search-box input {
                flex: 1;
                width: 100%;
            }
        }

        @media(max-width:768px) {
            .topbar {
                border-radius: 15px;
                padding: 10px;
            }

            .toggle-btn {
                padding: 6px 10px;
            }

            .cart-btn {
                display: flex;
                align-items: center;
                gap: 4px;
            }
        }

        @media(max-width:768px) {
            .topbar {
                margin-bottom: 25px;
                /* increase space on mobile */
            }
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="logo">FusionStore</div>
        <div id="category-list"></div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <button class="toggle-btn" id="toggleBtn">
                <i class="ri-menu-line"></i>
            </button>

            <div class="search-box">
                <input id="search-input" placeholder="Search...">
                <button onclick="searchProducts()" class="toggle-btn">Search</button>
            </div>

            <button onclick="go_to_cart()" class="toggle-btn cart-btn">
                <i class="ri-shopping-cart-line"></i>
                <span id="cart-count">0</span>
            </button>
        </div>

        <!-- PRODUCTS -->
        <div class="row" id="product-list"></div>

    </div>

    <div id="overlay" class="overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        /* ================= YOUR ORIGINAL JS (UNCHANGED) ================= */

        let products = [];
        let cart = [];
        let activeCategory = "all";
        let searchQuery = "";
        let isLoading = false;
        let loadError = false;

        let categoriesList = [
            { key: "all", label: "All Products", icon: "ri-apps-line" }
        ];

        const productContainer = document.getElementById("product-list");
        const cartCountSpan = document.getElementById("cart-count");
        const categoryListDiv = document.getElementById("category-list");

        async function loadProductsFromJSON() {
            try {
                isLoading = true;

                const res = await fetch('Asset/files/products.json');
                const data = await res.json();

                products = data;

                buildCategoriesFromProducts();
                isLoading = false;
                renderProducts();

            } catch (e) {
                console.error(e);
            }
        }

        function buildCategoriesFromProducts() {
            const unique = [...new Set(products.map(p => p.category))];

            categoriesList = [{ key: "all", label: "All Products" }];

            unique.forEach(c => {
                categoriesList.push({ key: c, label: c });
            });

            renderCategories();
        }

        function renderCategories() {
            categoryListDiv.innerHTML = categoriesList.map(cat => `
<div class="category-item ${activeCategory === cat.key ? 'category-active' : ''}" data-cat="${cat.key}">
${cat.label}
</div>
`).join('');

            document.querySelectorAll('.category-item').forEach(el => {
                el.onclick = () => {
                    activeCategory = el.dataset.cat;
                    searchQuery = "";
                    document.getElementById("search-input").value = "";

                    renderCategories();
                    renderProducts();
                }
            });
        }

        function getFilteredProducts() {
            let filtered = [...products];

            if (activeCategory !== "all") {
                filtered = filtered.filter(p => p.category === activeCategory);
            }

            if (searchQuery) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            return filtered;
        }

        function renderProducts() {
            const filtered = getFilteredProducts();

            productContainer.innerHTML = filtered.map(p => `
<div class="col-md-4 mb-4">
<div class="product-card">
<div class="product-img">
<img src="${p.image}">
</div>

<div>${p.name}</div>

<div class="price">
$${p.price}
${p.oldPrice ? `<span class="old">$${p.oldPrice}</span>` : ''}
</div>

<button class="btn-add" onclick="add_to_cart(${p.id})">
Add to Cart
</button>

</div>
</div>
`).join('');
        }

        function updateCartUI() {
            cartCountSpan.innerText = cart.length;
        }

        function add_to_cart(id) {
            if (!cart.includes(id)) {
                cart.push(id);
                updateCartUI();


                localStorage.setItem("fusion_cart", JSON.stringify(cart));
            }
        }

        function searchProducts() {
            searchQuery = document.getElementById("search-input").value;
            renderProducts();
        }

        window.go_to_cart = function () {


            const savedCart = JSON.parse(localStorage.getItem("fusion_cart")) || [];

            if (savedCart.length === 0) {
                Swal.fire("Empty Cart", "Add some products first!", "info");
                return;
            }

            const cartParam = encodeURIComponent(JSON.stringify(savedCart));

            window.location.href = `cart.html?cart=${cartParam}`;
        };


        const overlay = document.getElementById("overlay");

        toggleBtn.onclick = () => {
            sidebar.classList.toggle("show");
            overlay.classList.toggle("show");
        };

        overlay.onclick = () => {
            sidebar.classList.remove("show");
            overlay.classList.remove("show");
        };

        function loadCartFromStorage() {
            const saved = localStorage.getItem("fusion_cart");
            if (saved) {
                cart = JSON.parse(saved);
                updateCartUI();
            }
        }

        document.addEventListener("click", function (e) {
            const isClickInsideSidebar = sidebar.contains(e.target);
            const isClickOnToggle = toggleBtn.contains(e.target);

            // Only run on mobile (optional but recommended)
            if (window.innerWidth <= 768) {
                if (!isClickInsideSidebar && !isClickOnToggle) {
                    sidebar.classList.remove("show");
                }
            }
        });

        loadCartFromStorage();
        loadProductsFromJSON();

        document.getElementById("search-input").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                searchProducts();
            }
        });

    </script>
</body>

</html>
