<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<style>
    .navbar {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .card {
        border-radius: 12px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .card-img-top {
        height: 200px;
        object-fit: cover;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #007bff, #0056b3);
        border: none;
        border-radius: 8px;
    }

    .btn-primary:hover {
        background: linear-gradient(135deg, #0056b3, #003f7f);
    }

    #cart-count {
        background: red;
        color: white;
        padding: 2px 8px;
        border-radius: 50%;
        font-size: 0.8rem;
    }
    .search-products input[type="search"] {
      width: 20px;             
      padding: 5px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
</style>

<body>
    
    <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark ">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MyShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <li class="nav-item"><a onclick="go_to_cart()" id="cart_link" class="btn btn-warning position-relative ms-3"
                    class="nav-link" href="javascript:void()"><i class="ri-shopping-cart-2-line"
                        style="font-size:1.4rem;"></i>(<span id="cart-count">0</span>)</a></li>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                </ul>
            </div>
        </div>
    </nav>
    </header>
    
    <form class="d-flex ms-3" role="search">
        <input class="form-control me-2" type="search" placeholder="Search products" aria-label="Search"
            id="search-input">
        <button class="btn btn-outline-dark" type="button" onclick="searchProducts()">Search</button>
    </form>
  <aside class="">
        <div class="item close_nav">
            <button>&times</button>
        </div>
        <div class="item src_container">
            <input type="search" placeholder="Search" />
            <button>Search</button>
        </div>
        <div class="item">Phone Accessories</div>        
        <div class="item">Electronics</div>        
        <div class="item">Mobile phones and tablets</div>             
    </aside>    

    <div class="container my-5">
        <div class="row" id="product-list">
        </div>
    </div>
    

</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="Asset/js/script.js"></script>
<script>
    let cart = [];
    let products = null;
    let cartCount = 0;
    const productList = document.getElementById("product-list");
    productList.innerHTML = `<div class='col-10 p-5 mx-auto card shadow bg-warning-subtle text-center'> <span class='spinner-border'></span> Loading  </div>`
    get_products(true);

    function load_productsUi() {
        productList.innerHTML = '';
        products.forEach(product => {
            const col = document.createElement("div");
            col.className = "col-md-4 mb-4";
            col.innerHTML = `
      <div class="card h-100">
        <img src="asset/images/${product.image}" class="card-img-top" alt="${product.name}  object-fit:cover;">
        <div class="card-body">
          <h5 class="card-title">${product.name}</h5>
          <p class="card-text">$${product.price}</p>
          <button class="btn btn-primary add-to-cart" data-id="${product.id}" onclick='add_to_cart(${product.id})'>Add to Cart</button>
        </div>
      </div>
    `;
            productList.appendChild(col);
        });
    }

    function add_to_cart(prod_id) {
        cartCount++;
        if (!cart.includes(prod_id)) {
            cart.push(prod_id)
            document.getElementById("cart-count").textContent = cartCount;
        } else {
            Swal.fire({
                title: "Info",
                text: "Item already added to cart",
                icon: "info",
                showCancelButton: false,
                confirmButtonColor: "#3085d6",
                confirmButtonText: "Ok"
            })
        }
        console.log(cart)
    };
    function go_to_cart() {
        if(cart.length>0) location.href = 'cart.html?user=solomon&q=' + cart;
    }
</script>

</html>
